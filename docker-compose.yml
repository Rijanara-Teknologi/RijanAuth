services:
  appseed-app:
    container_name: appseed_app
    restart: always
    build: .
    ports:
      - "${APP_PORT:-5085}:5085"
    # ----------------------------------------------------------------
    # SQLite persistence: the named volume below keeps db.sqlite3 alive
    # across container rebuilds.  To use a host bind-mount instead,
    # replace "sqlite_data:/data" with "./data:/data" (and create the
    # ./data directory on the host first).
    # ----------------------------------------------------------------
    volumes:
      - sqlite_data:/data
    # ----------------------------------------------------------------
    # Default database: SQLite (no external service needed).
    # To use MySQL instead, uncomment the networks/depends_on blocks
    # below, uncomment the mysql and mysql-setup services further
    # down, and set DB_ENGINE/DB_HOST/DB_NAME/DB_USERNAME/DB_PASS in
    # your .env file (copy env.sample to .env as a starting point).
    # ----------------------------------------------------------------
    # networks:
    #   - db_network
    # depends_on:
    #   mysql:
    #     condition: service_healthy
    #   mysql-setup:
    #     condition: service_completed_successfully
    # environment:
    #   - DB_ENGINE=${DB_ENGINE:-mysql}
    #   - DB_HOST=${DB_HOST:-mysql}
    #   - DB_PORT=${DB_PORT:-3306}
    #   - DB_NAME=${DB_NAME:-rijanauth}
    #   - DB_USERNAME=${DB_USERNAME:-rijanauth_user}
    #   - DB_PASS=${DB_PASS:?DB_PASS must be set in .env}

  # ------------------------------------------------------------------
  # MySQL 8.0 Database Service  (optional – commented out by default).
  #
  # Remote access (VPN – Zerotier / Tailscale):
  #   • mysql/my.cnf sets bind-address = 0.0.0.0 so MySQL listens on
  #     all interfaces, including the VPN interface.
  #   • mysql/init/01-remote-access.sql grants rijanauth_user@'%' so
  #     the app user can connect from any host on the VPN.
  #   • Port 3306 is published to the Docker host (0.0.0.0:3306:3306).
  #
  # ⚠  SECURITY: binding 0.0.0.0 exposes port 3306 on every host
  #     interface. Protect it with firewall rules that allow TCP 3306
  #     ONLY from the VPN subnet before starting the service:
  #       Zerotier  – allow from 10.147.0.0/16
  #       Tailscale – allow from 100.64.0.0/10
  #     See mysql/my.cnf and mysql/init/01-remote-access.sql for
  #     subnet-restricted alternatives.
  # ------------------------------------------------------------------
  # mysql:
  #   container_name: rijanauth_mysql
  #   image: mysql:8.0
  #   restart: always
  #   environment:
  #     # Required: set MYSQL_ROOT_PASSWORD and DB_PASS in your .env file
  #     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set in .env}
  #     MYSQL_DATABASE: ${DB_NAME:-rijanauth}
  #     MYSQL_USER: ${DB_USERNAME:-rijanauth_user}
  #     MYSQL_PASSWORD: ${DB_PASS:?DB_PASS must be set in .env}
  #   ports:
  #     - "${MYSQL_BIND_HOST:-0.0.0.0}:${MYSQL_PORT:-3306}:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #     - ./mysql/my.cnf:/etc/mysql/conf.d/rijanauth.cnf:ro
  #     - ./mysql/init:/docker-entrypoint-initdb.d:ro
  #   networks:
  #     - db_network
  #   healthcheck:
  #     test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD 2>/dev/null"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 30s

  # ------------------------------------------------------------------
  # One-shot service that ensures the app user exists and has the
  # correct grants  (optional – commented out by default).
  # ------------------------------------------------------------------
  # mysql-setup:
  #   container_name: rijanauth_mysql_setup
  #   image: mysql:8.0
  #   depends_on:
  #     mysql:
  #       condition: service_healthy
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set in .env}
  #     MYSQL_USER: ${DB_USERNAME:-rijanauth_user}
  #     MYSQL_PASSWORD: ${DB_PASS:?DB_PASS must be set in .env}
  #     MYSQL_DATABASE: ${DB_NAME:-rijanauth}
  #   networks:
  #     - db_network
  #   entrypoint:
  #     - sh
  #     - -c
  #     - >-
  #         mysql -h mysql -uroot -p$$MYSQL_ROOT_PASSWORD
  #         -e "CREATE USER IF NOT EXISTS '$$MYSQL_USER'@'%' IDENTIFIED BY '$$MYSQL_PASSWORD';
  #         GRANT ALL PRIVILEGES ON $$MYSQL_DATABASE.* TO '$$MYSQL_USER'@'%';
  #         FLUSH PRIVILEGES;"
  #   restart: "no"

# networks:
#   db_network:
#     driver: bridge

volumes:
  sqlite_data:
  # Uncomment mysql_data when enabling the MySQL service above:
  # mysql_data:
