version: '3.8'
services:
  appseed-app:
    container_name: appseed_app
    restart: always
    build: .
    ports:
      - "${APP_PORT:-5085}:5085"
    networks:
      - db_network
    # ----------------------------------------------------------------
    # MySQL connection settings.
    # All values are read from the .env file (or shell environment).
    # Copy env.sample to .env and fill in the values before running.
    # ----------------------------------------------------------------
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_ENGINE=${DB_ENGINE:-mysql}
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-rijanauth}
      - DB_USERNAME=${DB_USERNAME:-rijanauth_user}
      # Required: set DB_PASS in your .env file
      - DB_PASS=${DB_PASS:?DB_PASS must be set in .env}

  # ------------------------------------------------------------------
  # MySQL 8.0 Database Service.
  #
  # Remote access (VPN – Zerotier / Tailscale):
  #   • mysql/my.cnf sets bind-address = 0.0.0.0 so MySQL listens on
  #     all interfaces, including the VPN interface.
  #   • mysql/init/01-remote-access.sql grants rijanauth_user@'%' so
  #     the app user can connect from any host on the VPN.
  #   • Port 3306 is published to the Docker host (0.0.0.0:3306:3306).
  #
  # ⚠  SECURITY: binding 0.0.0.0 exposes port 3306 on every host
  #     interface. Protect it with firewall rules that allow TCP 3306
  #     ONLY from the VPN subnet before starting the service:
  #       Zerotier  – allow from 10.147.0.0/16
  #       Tailscale – allow from 100.64.0.0/10
  #     See mysql/my.cnf and mysql/init/01-remote-access.sql for
  #     subnet-restricted alternatives.
  # ------------------------------------------------------------------
  mysql:
    container_name: rijanauth_mysql
    image: mysql:8.0
    restart: always
    environment:
      # Required: set MYSQL_ROOT_PASSWORD and DB_PASS in your .env file
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set in .env}
      MYSQL_DATABASE: ${DB_NAME:-rijanauth}
      MYSQL_USER: ${DB_USERNAME:-rijanauth_user}
      MYSQL_PASSWORD: ${DB_PASS:?DB_PASS must be set in .env}
    ports:
      - "${MYSQL_BIND_HOST:-0.0.0.0}:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/rijanauth.cnf:ro
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - db_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  db_network:
    driver: bridge

volumes:
  mysql_data:
