version: '3.8'
services:
  appseed-app:
    container_name: appseed_app
    restart: always
    build: .
    ports:
      - "5085:5085"
    networks:
      - db_network
    # ----------------------------------------------------------------
    # MySQL connection settings (optional).
    # Uncomment the 'environment' block below and the 'depends_on'
    # section to connect this service to the MySQL database defined
    # further down in this file.
    # ----------------------------------------------------------------
    # depends_on:
    #   mysql:
    #     condition: service_healthy
    # environment:
    #   - DB_ENGINE=mysql
    #   - DB_HOST=mysql
    #   - DB_PORT=3306
    #   - DB_NAME=rijanauth
    #   - DB_USERNAME=rijanauth_user
    #   - DB_PASS=rijanauth_password_change_me

  # ------------------------------------------------------------------
  # MySQL 8.0 Database Service (optional).
  # To enable MySQL support:
  #   1. Uncomment this entire service block (remove the leading '#').
  #   2. Uncomment the 'depends_on' and 'environment' blocks in the
  #      'appseed-app' service above.
  #   3. Change the default passwords before running in production.
  #   4. Run: docker compose up -d
  #
  # Remote access (VPN – Zerotier / Tailscale):
  #   • mysql/my.cnf sets bind-address = 0.0.0.0 so MySQL listens on
  #     all interfaces, including the VPN interface.
  #   • mysql/init/01-remote-access.sql grants rijanauth_user@'%' so
  #     the app user can connect from any host on the VPN.
  #   • Port 3306 is published to the Docker host (0.0.0.0:3306:3306).
  #
  # ⚠  SECURITY: binding 0.0.0.0 exposes port 3306 on every host
  #     interface. Protect it with firewall rules that allow TCP 3306
  #     ONLY from the VPN subnet before starting the service:
  #       Zerotier  – allow from 10.147.0.0/16
  #       Tailscale – allow from 100.64.0.0/10
  #     See mysql/my.cnf and mysql/init/01-remote-access.sql for
  #     subnet-restricted alternatives.
  # ------------------------------------------------------------------
  # mysql:
  #   container_name: rijanauth_mysql
  #   image: mysql:8.0
  #   restart: always
  #   environment:
  #     MYSQL_ROOT_PASSWORD: root_password_change_me
  #     MYSQL_DATABASE: rijanauth
  #     MYSQL_USER: rijanauth_user
  #     MYSQL_PASSWORD: rijanauth_password_change_me
  #   ports:
  #     - "0.0.0.0:3306:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #     - ./mysql/my.cnf:/etc/mysql/conf.d/rijanauth.cnf:ro
  #     - ./mysql/init:/docker-entrypoint-initdb.d:ro
  #   networks:
  #     - db_network
  #   healthcheck:
  #     test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD 2>/dev/null"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

networks:
  db_network:
    driver: bridge

# Uncomment the volumes section below when the MySQL service is enabled.
# volumes:
#   mysql_data:
