<!DOCTYPE html>
<html lang="en">

<head>
    <title>RijanAuth - {% block title %}{% endblock %}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0, minimal-ui">
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="description" content="RijanAuth Identity Server" />

    <link rel="icon" href="{{ config.ASSETS_ROOT }}/images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="{{ config.ASSETS_ROOT }}/fonts/fontawesome/css/fontawesome-all.min.css">
    <link rel="stylesheet" href="{{ config.ASSETS_ROOT }}/plugins/animation/css/animate.min.css">
    <link rel="stylesheet" href="{{ config.ASSETS_ROOT }}/css/style.css">
    <link rel="stylesheet" href="{{ config.ASSETS_ROOT }}/css/dark.css">

    <style>
        :root {
            --primary-color: {{ customization.primary_color if customization else '#673ab7' }};
            --secondary-color: {{ customization.secondary_color if customization else '#3F51B5' }};
            --button-radius: {{ customization.button_radius if customization else 4 }}px;
            --form-radius: {{ customization.form_radius if customization else 4 }}px;
            --font-family: {{ customization.font_family if customization else 'Inter, system-ui, -apple-system, sans-serif' }};
        }

        body {
            {% if customization and customization.background_type == 'image' and customization.background_image_url %}
            background-image: url('{{ customization.background_image_url }}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            {% elif customization and customization.background_type == 'gradient' and customization.background_gradient %}
            background: linear-gradient({{ customization.background_gradient.direction }}, {{ customization.background_gradient.colors | join(', ') }});
            {% else %}
            background-color: {{ customization.background_color if customization else '#673AB7' }};
            {% endif %}
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-family);
        }

        .auth-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-width: 100%;
            min-height: 100vh;
        }

        .auth-content {
            position: relative;
            padding: 15px;
            z-index: 5;
            width: 100%;
            max-width: 400px;
        }

        .card {
            border: none;
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.1);
            border-radius: var(--form-radius);
        }

        .btn-primary {
            background: var(--primary-color);
            border-color: var(--primary-color);
            border-radius: var(--button-radius);
        }

        .btn-primary:hover {
            background: var(--secondary-color);
            border-color: var(--secondary-color);
        }
        
        .form-control {
            border-radius: var(--form-radius);
        }
        
        {% if customization and customization.safe_css %}
        /* Custom CSS */
        {{ customization.safe_css | safe }}
        {% endif %}

        .logo-text {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 24px;
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-content">
            <div class="card">
                <div class="card-body text-center">
                    {% if customization and customization.logo_url %}
                    <div class="mb-4">
                        <img src="{{ customization.logo_url }}" alt="Logo" style="max-height: 80px;">
                    </div>
                    {% else %}
                    <div class="mb-4">
                        <i class="feather icon-lock auth-icon"></i>
                    </div>
                    {% endif %}
                    {% if realm %}
                    <h4 class="mb-2" style="color: var(--primary-color);">{{ realm.display_name or realm.name }}</h4>
                    {% endif %}
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>

    <script src="{{ config.ASSETS_ROOT }}/js/vendor-all.min.js"></script>
    <script src="{{ config.ASSETS_ROOT }}/plugins/bootstrap/js/bootstrap.min.js"></script>
</body>

</html>
