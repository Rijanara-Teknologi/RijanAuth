<!-- [ navigation menu ] start -->
<nav class="pcoded-navbar">
    <div class="navbar-wrapper">
        <div class="navbar-brand header-logo">
            <a href="{{ url_for('admin.index') }}" class="b-brand">
                <div class="b-bg" style="background: linear-gradient(135deg, #673ab7 0%, #512da8 100%);">
                    <i class="feather icon-shield"></i>
                </div>
                <span class="b-title">RijanAuth</span>
            </a>
            <a class="mobile-menu" id="mobile-collapse" href="javascript:"><span></span></a>
        </div>
        <div class="navbar-content scroll-div">
            <!-- Realm Selector -->
            <div class="p-3 border-bottom">
                <label class="text-muted small mb-1">Current Realm</label>
                <select id="realm-selector" class="form-control form-control-sm" onchange="switchRealm(this.value)">
                    {% for r in realms %}
                    <option value="{{ r.name }}" {% if realm and r.id==realm.id %}selected{% endif %}>
                        {{ r.display_name or r.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <ul class="nav pcoded-inner-navbar">
                <li class="nav-item pcoded-menu-caption">
                    <label>Overview</label>
                </li>
                <li data-username="dashboard" class="nav-item {% if segment == 'dashboard' %} active {% endif %}">
                    <a href="{{ url_for('admin.dashboard', realm_name=realm.name if realm else 'master') }}"
                        class="nav-link">
                        <span class="pcoded-micon"><i class="feather icon-home"></i></span>
                        <span class="pcoded-mtext">Dashboard</span>
                    </a>
                </li>

                <li class="nav-item pcoded-menu-caption">
                    <label>Manage</label>
                </li>

                <li data-username="users" class="nav-item {% if segment == 'users' %} active {% endif %}">
                    <a href="{{ url_for('admin.users_list', realm_name=realm.name if realm else 'master') }}"
                        class="nav-link">
                        <span class="pcoded-micon"><i class="feather icon-users"></i></span>
                        <span class="pcoded-mtext">Users</span>
                    </a>
                </li>

                <li data-username="groups" class="nav-item {% if segment == 'groups' %} active {% endif %}">
                    <a href="{{ url_for('admin.groups_list', realm_name=realm.name if realm else 'master') }}"
                        class="nav-link">
                        <span class="pcoded-micon"><i class="feather icon-folder"></i></span>
                        <span class="pcoded-mtext">Groups</span>
                    </a>
                </li>

                <li data-username="clients" class="nav-item {% if segment == 'clients' %} active {% endif %}">
                    <a href="{{ url_for('admin.clients_list', realm_name=realm.name if realm else 'master') }}"
                        class="nav-link">
                        <span class="pcoded-micon"><i class="feather icon-grid"></i></span>
                        <span class="pcoded-mtext">Clients</span>
                    </a>
                </li>

                <li data-username="roles" class="nav-item {% if segment == 'roles' %} active {% endif %}">
                    <a href="{{ url_for('admin.roles_list', realm_name=realm.name if realm else 'master') }}"
                        class="nav-link">
                        <span class="pcoded-micon"><i class="feather icon-award"></i></span>
                        <span class="pcoded-mtext">Realm Roles</span>
                    </a>
                </li>

                <li class="nav-item pcoded-menu-caption">
                    <label>Configure</label>
                </li>

                <li data-username="client-scopes" class="nav-item {% if segment == 'client-scopes' %} active {% endif %}">
                    <a href="{{ url_for('admin.client_scopes_list', realm_name=realm.name if realm else 'master') }}"
                        class="nav-link">
                        <span class="pcoded-micon"><i class="feather icon-layers"></i></span>
                        <span class="pcoded-mtext">Client Scopes</span>
                    </a>
                </li>

                <li data-username="federation" class="nav-item {% if segment == 'federation' %} active {% endif %}">
                    <a href="{{ url_for('admin.federation_list', realm_name=realm.name if realm else 'master') }}"
                        class="nav-link">
                        <span class="pcoded-micon"><i class="feather icon-link"></i></span>
                        <span class="pcoded-mtext">User Federation</span>
                    </a>
                </li>

                <li data-username="realm settings"
                    class="nav-item {% if segment == 'realm-settings' %} active {% endif %}">
                    <a href="{{ url_for('admin.realm_settings', realm_name=realm.name if realm else 'master') }}"
                        class="nav-link">
                        <span class="pcoded-micon"><i class="feather icon-settings"></i></span>
                        <span class="pcoded-mtext">Realm Settings</span>
                    </a>
                </li>

                <li data-username="events" class="nav-item {% if segment == 'events' %} active {% endif %}">
                    <a href="{{ url_for('admin.events_list', realm_name=realm.name if realm else 'master') }}"
                        class="nav-link">
                        <span class="pcoded-micon"><i class="feather icon-activity"></i></span>
                        <span class="pcoded-mtext">Events</span>
                    </a>
                </li>

                <li data-username="sessions" class="nav-item {% if segment == 'sessions' %} active {% endif %}">
                    <a href="{{ url_for('admin.sessions_list', realm_name=realm.name if realm else 'master') }}"
                        class="nav-link">
                        <span class="pcoded-micon"><i class="feather icon-monitor"></i></span>
                        <span class="pcoded-mtext">Sessions</span>
                    </a>
                </li>

                <li class="nav-item pcoded-menu-caption">
                    <label>Account</label>
                </li>

                <!-- Backup menu: master realm only -->
                {% if realm and realm.name == master_realm_name %}
                <li class="nav-item pcoded-hasmenu {% if segment == 'backup' %}active pcoded-trigger{% endif %}">
                    <a href="#" class="nav-link">
                        <span class="pcoded-micon"><i class="feather icon-server"></i></span>
                        <span class="pcoded-mtext">Backup</span>
                    </a>
                    <ul class="pcoded-submenu">
                        <li class="{% if segment == 'backup' and request.endpoint == 'admin.backup_index' %}active{% endif %}">
                            <a href="{{ url_for('admin.backup_index', realm_name=realm.name) }}" class="nav-link">
                                <span class="pcoded-mtext">Backup</span>
                            </a>
                        </li>
                        <li class="{% if segment == 'backup' and request.endpoint == 'admin.backup_restore' %}active{% endif %}">
                            <a href="{{ url_for('admin.backup_restore', realm_name=realm.name) }}" class="nav-link">
                                <span class="pcoded-mtext">Restore</span>
                            </a>
                        </li>
                    </ul>
                </li>
                {% endif %}

                <li data-username="create realm" class="nav-item">
                    <a href="{{ url_for('admin.create_realm') }}" class="nav-link">
                        <span class="pcoded-micon"><i class="feather icon-plus-circle"></i></span>
                        <span class="pcoded-mtext">Create Realm</span>
                    </a>
                </li>

                <li data-username="logout" class="nav-item">
                    <a href="{{ url_for('auth_bp.logout') }}" class="nav-link">
                        <span class="pcoded-micon"><i class="feather icon-power"></i></span>
                        <span class="pcoded-mtext">Sign Out</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<!-- [ navigation menu ] end -->

<script>
    function switchRealm(realmName) {
        // Extract current path and replace realm
        const path = window.location.pathname;
        const adminMatch = path.match(/^\/admin\/([^\/]+)(\/.*)?$/);
        if (adminMatch) {
            const rest = adminMatch[2] || '';
            window.location.href = '/admin/' + realmName + rest;
        } else {
            window.location.href = '/admin/' + realmName;
        }
    }
</script>
