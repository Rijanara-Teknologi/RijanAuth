{% extends "layouts/auth_base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<h3 class="mb-4">Login</h3>

{% if msg %}
<div class="alert alert-danger text-left">
    {{ msg | safe }}
</div>
{% endif %}

<form method="POST" action="">
    <div class="input-group mb-3">
        <input type="text" name="username" class="form-control" placeholder="Username or Email" required>
    </div>
    <div class="input-group mb-4">
        <input type="password" name="password" class="form-control" placeholder="Password" required>
    </div>
    <div class="form-group text-left">
        <div class="checkbox checkbox-fill d-inline">
            <input type="checkbox" name="remember" id="checkbox-fill-a1">
            <label for="checkbox-fill-a1" class="cr"> Remember me</label>
        </div>
    </div>
    <button class="btn btn-primary shadow-2 mb-4 w-100">Login</button>
</form>

<p class="mb-2 text-muted">Forgot password? <a href="#" class="text-muted">Reset</a></p>
<p class="mb-0 text-muted">Don't have an account? <a href="#" class="text-muted">Register</a></p>
{% endblock %}
